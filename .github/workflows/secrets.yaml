name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -- Gitleaks: fast regex scan against .gitleaks.toml --
      - name: Run Gitleaks
        id: gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        continue-on-error: true
        with:
          args: detect --source=/github/workspace --config=/github/workspace/.gitleaks.toml --no-git --verbose --redact --report-format json --report-path /github/workspace/gitleaks-report.json

      - name: Parse Gitleaks report
        id: parse-report
        if: steps.gitleaks.outcome == 'failure'
        run: |
          if [ -f gitleaks-report.json ]; then
            FILES=$(jq -r '[.[].File] | unique | .[]' gitleaks-report.json | head -10 | tr '\n' ', ' | sed 's/,$//')
            echo "matched_files=$FILES" >> $GITHUB_OUTPUT
          else
            echo "matched_files=unknown" >> $GITHUB_OUTPUT
          fi

      # -- TruffleHog: verified-only credential scan --
      - name: Run TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified

      # -- Fail if either scanner found secrets --
      - name: Evaluate results
        if: steps.gitleaks.outcome == 'failure' || steps.trufflehog.outcome == 'failure'
        run: |
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "::error::Gitleaks detected potential secrets"
          fi
          if [ "${{ steps.trufflehog.outcome }}" = "failure" ]; then
            echo "::error::TruffleHog detected verified credentials"
          fi
          exit 1

      - name: Notify Slack on failure
        if: failure() && env.SLACK_NOTIFY_URL != ''
        env:
          SLACK_NOTIFY_URL: ${{ secrets.SLACK_NOTIFY_URL }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#soliplex",
              "username": "secret-scan-ci",
              "text": ${{ toJson(format(':rotating_light: Secret scan failed on {0}:\n{1}\n{2}/{3}/actions/runs/{4}', github.head_ref || github.ref_name, github.event.head_commit.message, github.server_url, github.repository, github.run_id)) }},
              "icon_emoji": ":rotating_light:"
            }
