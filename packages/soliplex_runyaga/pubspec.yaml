name: soliplex_runyaga
description: Steampunk mIRC-style chat client for Soliplex — The Boiler Room
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  google_fonts: ^6.2.1
  soliplex_agent:
    path: ../soliplex_agent
  soliplex_client:
    path: ../soliplex_client
  soliplex_client_native:
    path: ../soliplex_client_native
  soliplex_logging:
    path: ../soliplex_logging
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.0.0
  flutter_highlight: ^0.7.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
