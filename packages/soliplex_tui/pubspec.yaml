name: soliplex_tui
description: Rich terminal UI for Soliplex AI backend, built on nocterm.
version: 0.1.0-dev
publish_to: none

environment:
  sdk: ^3.6.0

dependencies:
  args: ^2.5.0
  dart_monty_ffi: ^0.6.1
  dart_monty_platform_interface: ^0.6.1
  glob: ^2.1.0
  nocterm: ^0.5.0
  signals_core: ^6.2.0
  soliplex_agent:
    path: ../soliplex_agent
  soliplex_client:
    path: ../soliplex_client
  soliplex_dataframe:
    path: ../soliplex_dataframe
  soliplex_interpreter_monty:
    path: ../soliplex_interpreter_monty
  soliplex_logging:
    path: ../soliplex_logging
  soliplex_scripting:
    path: ../soliplex_scripting

dev_dependencies:
  mocktail: ^1.0.0
  test: ^1.25.0
  very_good_analysis: ^10.0.0

